spring:
  application:
    name: cityglow-backend

  threads:
    virtual:
      enabled: true   # JDK 21 虚拟线程开关

  datasource:
    # 本地开发默认值;生产用环境变量覆盖
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/cityglow?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# 第三方 API Key:严禁硬编码,必须从环境变量或 .env 注入(见 backend/.env.example)
openweather:
  api:
    key: ${OPENWEATHER_API_KEY:}

nasa:
  apod:
    key: ${NASA_APOD_API_KEY:}
