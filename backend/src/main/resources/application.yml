spring:
  application:
    name: cityglow-backend

  threads:
    virtual:
      enabled: true   # JDK 21 虚拟线程开关

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  datasource:
    # 本地开发默认值;生产用环境变量覆盖
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/cityglow?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# 第三方 API Key:严禁硬编码,必须从环境变量或 .env 注入(见 backend/.env)
# 注:Open-Meteo 无需 API Key(免费开源),仅 NASA APOD 需要
nasa:
  apod:
    key: ${NASA_APOD_API_KEY:}

# JWT 签名密钥:默认值仅供本地开发,生产必须通过环境变量 JWT_SECRET 覆盖
# 要求:HS256 算法,密钥至少 32 字节(256 bits)
jwt:
  secret: ${JWT_SECRET:cityglow-secret-key-for-jwt-signing-must-be-at-least-256-bits-long}
