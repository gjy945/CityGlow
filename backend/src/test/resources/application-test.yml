# 测试 profile:使用 H2 内存数据库(MySQL 模式),不依赖外部 MySQL
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

# 测试中显式置空 API Key,避免真实 Key 进入测试上下文
openweather:
  api:
    key: ""

nasa:
  apod:
    key: ""
